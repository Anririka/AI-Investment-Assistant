# layer3_news_processing_design.md §4-2の確定仕様どおり。
# LLMのimportance算出のブレを緩和するため、重大カテゴリに下限（フロア）を設ける。
# 適用ロジック: final_importance = max(llm_importance, category_importance_floor.get(category, default_floor))

category_importance_floor:
  earnings: 70
  ma_deal: 70
  guidance_revision: 70
  fomc: 70
  cpi: 70
  employment_stats: 70
default_floor: 0
