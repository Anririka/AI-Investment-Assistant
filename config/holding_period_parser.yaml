# layer7_proposal_tracking_design.md §8-3の確定仕様。
#
# Layer5が出力する`holding_period`は自然文（例：「2〜4週間」「1ヶ月程度」）であり、
# 厳密な日数ではない。文字列内の数値をすべて抽出し最大値を採用、抽出した数値に対応する
# 単位（直後に出現する単位語）を掛けて日数を算出する。例：「2〜4週間」→ 4×7 = 28日。
unit_days:
  日: 1
  週間: 7
  週: 7
  ヶ月: 30
  か月: 30
  カ月: 30

# パース失敗時（数値または単位が抽出できない場合）に採用するフォールバック日数。
# parse_status: "fallback_used" として記録し、隠蔽しない。
fallback_default_days: 90
