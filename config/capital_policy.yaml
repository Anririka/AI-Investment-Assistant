# 投資可能資金ポリシー（新設・Layer5固有の運用設定）。
#
# layer5_ai_judgment_design.md §8のposition_sizer.py算出式は「投資可能資金（設計上は
# 300万円）× 33%」という恒久設計値を前提に書かれている。本ファイルは、その「投資可能
# 資金」そのものの実際の値を人手で確定させるための設定であり、設計書の割合ベースの
# ルール（1銘柄33%上限・-10%損切り等）そのものは一切変更しない。
#
# 重要（2026-07、ユーザー明示確認事項）：
# 初期の信頼検証期間中は、恒久設計値である300万円ではなく、ユーザーが指定した
# 25万円のみを実際の投資可能資金として使う。理由：まず推奨銘柄を信頼してよいかを
# 少額で確認したいというユーザーの意向（初回投資額を抑えたい）による。
#
# この上限はAIが自動調整するものではない。test_phase.enabled を false に戻すか、
# 本ファイルの値を人手で書き換えない限り、恒久値（300万円）には自動的に移行しない
# （load_portfolio_state.pyのresolve_total_capital()参照）。
#
# 期間（2026-07、ユーザー明示確認事項・追加）：
# 初回のみではなく「最初の1か月」をこの上限ありの設定で運用する。ただし
# planned_start_date／planned_end_date／planned_duration_daysは、あくまで人間向けの
# 目安・記録用のフィールドである。resolve_total_capital()はこれらの日付を一切参照
# しない（=期限が来ても自動的にfalseへは切り替わらない）。上限の解除・金額変更・
# 期間の延長は、必ず人間がenabled／total_capitalを直接編集して判断する。
full_scale:
  total_capital: 3000000

test_phase:
  enabled: true
  total_capital: 250000
  planned_duration_days: 30
  # 実際にLayer5の実運用テスト（提案の採用判断）を開始した日に合わせて、
  # 人手でこの2つの日付を更新すること（自動計算はしない）。ひとまず本設定を
  # 反映した日（2026-07-20）を起点の仮値としている。
  planned_start_date: "2026-07-20"
  planned_end_date: "2026-08-20"
  note: >
    初期信頼検証期間中のユーザー指定上限（2026-07確定、期間は最初の1か月を想定）。
    全額運用（300万円）へ移行する際、または期間を延長・短縮する際は、この
    enabled／total_capital／planned_end_date を人手で書き換えること
    （コード側での自動切替・自動延長は一切行わない）。
