# Layer1〜4（データ取得〜永続化）を実行するGitHub Actionsパイプライン。
# Phase0のsmoke test（環境構築・Secrets・Google Drive連携の確認）に加え、
# Phase1〜4（Layer1〜Layer4）のユニットテスト（tests/以下すべて）もここで自動実行する。
# Layer1〜4を実際に通しで実行する本番ステップ（実データ取得〜永続化）は、
# Layer5（Claude Coworkセッション側）の実装が固まったため、scripts/run_daily_pipeline.py
# として追加した（"Run daily pipeline"ステップ）。
#
# 注意：tests/layer5/・tests/layer6/・tests/layer7/ 配下のユニットテストもこの
# pytest ステップで一緒に実行される。Layer5（AI Agent実行層）・Layer6（レポート生成層、
# Ver1ではLayer5と同一Coworkセッション内で継続実行）はいずれもGitHub Actions上では動かず、
# Claude Coworkのスケジュールタスク側で稼働する（layer5_ai_judgment_design.md §0、
# layer6_report_generation_design.md §0）。ここでテストしているのは、それぞれが
# Bashツールで呼び出す決定的計算処理（scripts/*.py・formatters/等）のみ。
#
# Layer7（提案トラッキング層）・Layer8（自己評価層）はLayer1〜4と同様、GitHub Actions
# 上で動く独立したPythonパイプラインである（layer7_proposal_tracking_design.md §1、
# layer8_self_evaluation_design.md §1）が、Layer5/Layer6とは非同期の独自スケジュール
# （Layer8はLayer7完了後に続けて実行）で稼働するため、実行ジョブ自体は本ワークフロー
# ではなく別ファイル（tracking_pipeline.yml・evaluation_pipeline.yml）に分離してある。
# ユニットテストのみここで実行する。

name: Data Pipeline (Layer1-4)

on:
  workflow_dispatch: {}
  # Phase1以降で実運用スケジュールを確定するまでは手動実行のみとする。
  # 稼働開始時にscheduleを有効化する（例：毎朝06:00 JST = 21:00 UTC）。
  # schedule:
  #   - cron: "0 21 * * *"

jobs:
  phase0-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (Layer1 + Layer2 + Layer3 + Layer4 + Layer5 scripts + Layer6 scripts + Layer7 + Layer8)
        run: pytest tests -v

      - name: Phase0 smoke test (config load + Google Drive connectivity)
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python scripts/phase0_smoke_test.py

      - name: Layer1 live data check (real APIs, small sample)
        # モックテストでは検証できない、実ライブAPIレスポンスとのフィールド名の
        # ズレを早期発見するための疎通確認。失敗してもジョブ全体は失敗させない
        # （フィールド名調整が必要なだけの場合があるため。ログを確認して対応する）。
        continue-on-error: true
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
        run: python scripts/layer1_live_check.py

      - name: Run daily pipeline (Layer1 real fetch -> Layer3 -> Layer2 -> Layer4 persist)
        # Layer1〜4を実データで通しで実行する本番ステップ（scripts/run_daily_pipeline.py参照）。
        # 1銘柄・1データソースの障害はwarning_errors/excluded_summaryに記録して継続する設計だが、
        # Google Drive永続化（Layer4）自体が失敗した場合はジョブを失敗させ、異常に気づけるようにする。
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/run_daily_pipeline.py
