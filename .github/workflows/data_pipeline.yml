# Layer1〜4（データ取得〜永続化）を実行するGitHub Actionsパイプライン。
# Phase0のsmoke test（環境構築・Secrets・Google Drive連携の確認）に加え、
# Phase1（Layer1）・Phase2（Layer2）のユニットテスト（tests/以下すべて）もここで自動実行する。
# Layer1〜2の本番実行ステップ（実データ取得〜スコアリング）は、Layer4完成後にここへ追加する。

name: Data Pipeline (Layer1-4)

on:
  workflow_dispatch: {}
  # Phase1以降で実運用スケジュールを確定するまでは手動実行のみとする。
  # 稼働開始時にscheduleを有効化する（例：毎朝06:00 JST = 21:00 UTC）。
  # schedule:
  #   - cron: "0 21 * * *"

jobs:
  phase0-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (Layer1 + Layer2 + Layer3)
        run: pytest tests -v

      - name: Phase0 smoke test (config load + Google Drive connectivity)
        env:
          GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python scripts/phase0_smoke_test.py

      - name: Layer1 live data check (real APIs, small sample)
        # モックテストでは検証できない、実ライブAPIレスポンスとのフィールド名の
        # ズレを早期発見するための疎通確認。失敗してもジョブ全体は失敗させない
        # （フィールド名調整が必要なだけの場合があるため。ログを確認して対応する）。
        continue-on-error: true
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
        run: python scripts/layer1_live_check.py
